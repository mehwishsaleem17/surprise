<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Balloon Celebration 🎈</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container balloon-container">

<h3>🎈 Balloon Celebration</h3>

<h1>Pop the Balloons!</h1>

<p>

Pop at least 15 balloons to unlock the next surprise.

</p>

<h2>

Popped:
<span id="score">0</span>/15

</h2>

<div id="balloonArea"></div>

<div id="balloonMessage">

<h2>🎉 Amazing! 🎉</h2>

<p>

You unlocked the next birthday surprise!

</p>

<button id="balloonNext">

Continue ➜

</button>

</div>

</div>

<script src="balloons.js"></script>

</body>

</html>
