<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Birthday Cake 🎂</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container cake-container">

<h3>🎂 Make a Wish</h3>

<h1>Birthday Cake</h1>

<div class="cake">

<div class="layer top"></div>

<div class="layer middle"></div>

<div class="layer bottom"></div>

<div class="candles">

<div class="candle">
<div class="flame"></div>
</div>

<div class="candle">
<div class="flame"></div>
</div>

<div class="candle">
<div class="flame"></div>
</div>

<div class="candle">
<div class="flame"></div>
</div>

<div class="candle">
<div class="flame"></div>
</div>

</div>

</div>

<button id="blow">

💨 Blow Out Candles

</button>

<div id="cakeMessage">

<h2>

🎉 Happy Birthday! 🎉

</h2>

<p>

May every wish you make today come true ❤️

</p>

<button id="cakeNext">

Continue ➜

</button>

</div>

</div>

<script src="cake.js"></script>

</body>

</html>
