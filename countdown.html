<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Birthday Countdown</title>

    <link rel="stylesheet" href="CS/style.css">

</head>

<body>

<div class="hearts"></div>

<div class="container">
    <h3>⏳ The Special Day Is Almost Here</h3>

    <h1>Birthday Countdown</h1>

    <div class="countdown">

        <div class="time-box">
            <span id="days">00</span>
            <small>Days</small>
        </div>

        <div class="time-box">
            <span id="hours">00</span>
            <small>Hours</small>
        </div>

        <div class="time-box">
            <span id="minutes">00</span>
            <small>Minutes</small>
        </div>
        <div class="time-box">
            <span id="seconds">00</span>
            <small>Seconds</small>
        </div>

    </div>

    <p class="message">
        Every second brings us closer to your beautiful day ❤️
    </p>

    <button id="nextBtn">Next Surprise ➜</button>

</div>

<script src="JS/countdown.js"></script>

</body>

</html>
